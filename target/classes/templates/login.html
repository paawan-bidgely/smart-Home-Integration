<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Energy Buddy - Link Account</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #00d4aa;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            background: #f9f9f9;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #00d4aa;
            background: #fff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #00d4aa;
            color: #0a1628;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #00c49a; }
        .helper {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">&#9889; Energy Buddy</div>
    <p class="subtitle">Link your utility account to get energy insights on Alexa</p>
    <form action="/auth/submit" method="post">
        <input type="hidden" name="state" th:value="${state}"/>
        <input type="hidden" name="redirectUri" th:value="${redirectUri}"/>

        <label for="utility">Utility Provider</label>
        <select id="utility" name="utility">
            <option value="BESCOM">BESCOM Bengaluru</option>
        </select>

        <label for="accountNumber">Account Number</label>
        <input type="text" id="accountNumber" name="accountNumber" placeholder="Enter your account number"/>

        <button type="submit" class="btn">Link My Account</button>
    </form>
    <p class="helper">Demo accounts: 12345 (heavy user) or 67890 (light user)</p>
</div>
</body>
</html>
